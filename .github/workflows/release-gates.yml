name: Release Gates

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gates-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.5.1"
  GODOT_STATUS: "stable"

jobs:
  godot-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Godot Headless
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip wget
          GODOT_BASE="Godot_v${GODOT_VERSION}-${GODOT_STATUS}"
          HEADLESS_ZIP="${GODOT_BASE}_linux.x86_64.zip"
          wget -O /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${HEADLESS_ZIP}"
          unzip -o /tmp/godot.zip -d /tmp/godot-bin
          chmod +x "/tmp/godot-bin/${GODOT_BASE}_linux.x86_64"
          echo "GODOT_BIN=/tmp/godot-bin/${GODOT_BASE}_linux.x86_64" >> "$GITHUB_ENV"

      - name: Run Godot Test Suite
        shell: bash
        run: |
          set -euxo pipefail
          ./addons/gdUnit4/runtest.sh --godot_binary "$GODOT_BIN" -a tests --ignoreHeadlessMode

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Nakama Module Tests
        shell: bash
        run: |
          set -euxo pipefail
          node --version
          node --test backend/nakama/tests/*.test.js
